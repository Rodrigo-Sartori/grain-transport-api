spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/grain_transport}
    username: ${DB_USER:grain_user}
    password: ${DB_PASSWORD:grain_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

stabilization:
  window-size: 5
  variance-threshold: 3.0
  scheduler-ms: 2000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${PORT:8080}
